services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pgy
      POSTGRES_PASSWORD: pgy
      POSTGRES_DB: pgytest
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgy -d pgytest"]
      interval: 2s
      timeout: 5s
      retries: 10
